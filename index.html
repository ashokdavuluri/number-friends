<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#FFF8E7" />
<title>Number Friends — counting games</title>
<link rel="icon" href="icon-180.png" type="image/png" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-title" content="Numbers" />
<link rel="manifest" href="manifest.webmanifest" />
<style>
  html, body { margin: 0; padding: 0; background: #FFF8E7; overscroll-behavior: none; }
  #root { min-height: 100vh; }
  .loading { display:flex; align-items:center; justify-content:center; min-height:100vh;
    font-family: 'Comic Sans MS', sans-serif; font-size: 28px; color: #B5ABC9; }
  #err { display:none; position:fixed; bottom:0; left:0; right:0; background:#FDE3E3; color:#8A1F1F;
    font: 13px monospace; padding:10px; white-space:pre-wrap; z-index:999; }
</style>
</head>
<body>
<div id="root"><div class="loading">Loading… 🐥</div></div>
<div id="err"></div>
<script>
window.addEventListener("error", function (e) {
  var el = document.getElementById("err");
  el.style.display = "block";
  el.textContent = "Error: " + (e.message || "unknown") + (e.filename ? "\n" + e.filename + ":" + e.lineno : "");
});
window.storage = {
  get: function (key) {
    var v = localStorage.getItem("nf-" + key);
    return Promise.resolve(v == null ? null : { key: key, value: v });
  },
  set: function (key, value) {
    localStorage.setItem("nf-" + key, value);
    return Promise.resolve({ key: key, value: value });
  },
  delete: function (key) {
    localStorage.removeItem("nf-" + key);
    return Promise.resolve({ key: key, deleted: true });
  },
};
</script>
