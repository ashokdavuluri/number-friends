<script>
// Storage shim: the app uses window.storage (async key-value);
// on GitHub Pages we back it with localStorage
window.storage = {
  async get(key) {
    const v = localStorage.getItem("nf-" + key);
    return v == null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem("nf-" + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem("nf-" + key);
    return { key, deleted: true };
  },
};

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ---------- Design tokens ----------
const C = {
  sky: "#FFF8E7",
  ink: "#2D2A4A",
  sun: "#FFC93F",
  coral: "#E84545",
  grass: "#53C177",
  berry: "#7C5CE0",

const THEMES = [

  { emoji: "🐵", name: "monkey", plural: "monkeys", color: "#8B5A2B", tint: "#F3EBDD" },
  { emoji: "🦆", name: "duck", plural: "ducks", color: "#2E86DE", tint: "#E4EFFA" },
  { emoji: "🐟", name: "fish", plural: "fish", color: "#3AA6B9", tint: "#E2F3F6" },
  { emoji: "🐸", name: "frog", plural: "frogs", color: "#3FA34D", tint: "#E1F5E4" },

  { emoji: "🍓", name: "strawberry", plural: "strawberries", color: "#E0447C", tint: "#FBE4EE" },
  { emoji: "🍕", name: "pizza slice", plural: "pizza slices", color: "#D9702A", tint: "#FAEBDF" },
  { emoji: "🧁", name: "cupcake", plural: "cupcakes", color: "#B76FC4", tint: "#F5E8F7" },
  { emoji: "🍪", name: "cookie", plural: "cookies", color: "#A0703C", tint: "#F4EBE1" },
];

const CHEERS = ["YAY! 🎉", "SUPER! 🌟", "WOW! 🤩", "AMAZING! 🚀", "YIPPEE! 🎈", "HOORAY! 🥳", "CLEVER! 🧠"];

const DIFFS = [
  { id: "easy", label: "Easy", max: 10, icon: "🐣", desc: "1–10" },
  { id: "medium", label: "Medium", max: 15, icon: "🐥", desc: "1–15" },
  { id: "hard", label: "Hard", max: 20, icon: "🦅", desc: "1–20" },
];

// ---------- Sound engine ----------
function useSounds() {
  const ctxRef = useRef(null);
  const mutedRef = useRef(false);
  const [muted, setMutedState] = useState(false);

  const getCtx = () => {
    if (!ctxRef.current) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) { try { ctxRef.current = new AC(); } catch (e) { return null; } }
    }
    const ctx = ctxRef.current;
    if (ctx && ctx.state === "suspended") ctx.resume().catch(() => {});
    return ctx;
  };

  useEffect(() => {
    const unlock = () => {
      const ctx = getCtx();
      if (!ctx) return;
      const finish = () => {
        try {
          const buf = ctx.createBuffer(1, 1, 22050);
          const src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
        } catch (e) {}
      };
      if (ctx.state === "suspended") ctx.resume().then(finish).catch(() => {});
      else finish();
    };
    const evts = ["pointerdown", "touchend", "mousedown", "click", "keydown"];
    evts.forEach((e) => window.addEventListener(e, unlock, { passive: true }));
    return () => evts.forEach((e) => window.removeEventListener(e, unlock));
  }, []);

  const tone = useCallback((freq, dur = 0.15, delay = 0, type = "sine", vol = 0.3) => {
    if (mutedRef.current) return;
    const ctx = getCtx();
    if (!ctx || ctx.state !== "running") return;
    try {
      const t = ctx.currentTime + delay;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g).connect(ctx.destination);
      o.start(t);
      o.stop(t + dur);
    } catch (e) {}
  }, []);

  const scale = [523, 587, 659, 698, 784, 880, 988, 1047, 1175, 1319];
  const api = {
    count: (n) => tone(scale[(n - 1) % 10], 0.22, 0, "triangle", 0.35),
    pop: () => { tone(880, 0.06, 0, "square", 0.2); tone(1760, 0.1, 0.03, "triangle", 0.25); },
    drop: () => { tone(392, 0.08, 0, "triangle", 0.25); tone(523, 0.14, 0.06, "triangle", 0.3); },
    win: () => { tone(659, 0.12); tone(784, 0.12, 0.1); tone(1047, 0.15, 0.2); tone(1319, 0.4, 0.32, "triangle", 0.25); },
    bigWin: () => { [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => tone(f, 0.18, i * 0.09, "triangle", 0.3)); },
    nudge: () => tone(220, 0.2, 0, "sine", 0.15),
    tap: () => tone(440, 0.08, 0, "triangle", 0.15),
    test: () => { tone(523, 0.15); tone(659, 0.15, 0.14); tone(784, 0.3, 0.28, "triangle", 0.3); },
  };

  const toggleMute = () => {
    const next = !mutedRef.current;
    mutedRef.current = next;
    setMutedState(next);
    if (!next) {
      const ctx = getCtx();
      if (ctx && ctx.state === "suspended") ctx.resume().then(() => api.test()).catch(() => {});
      else api.test();
    }
  };

  return { ...api, muted, toggleMute };
}

// ---------- Drag & drop (pointer-based, works on touch) ----------
function DragItem({ onDrop, children, disabled, style = {} }) {
  const [drag, setDrag] = useState(null);
  return (
    <div
      onPointerDown={(e) => {
        if (disabled) return;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch (err) {}
        setDrag({ sx: e.clientX, sy: e.clientY, cx: e.clientX, cy: e.clientY });
      }}
      onPointerMove={(e) => { if (drag) setDrag((d) => d && { ...d, cx: e.clientX, cy: e.clientY }); }}
      onPointerUp={(e) => {
        if (!drag) return;
        setDrag(null);
        if (onDrop) onDrop(e.clientX, e.clientY);
      }}
      onPointerCancel={() => setDrag(null)}
      style={{
        touchAction: "none", cursor: "grab", userSelect: "none",
        transform: drag ? `translate(${drag.cx - drag.sx}px, ${drag.cy - drag.sy}px) scale(1.15)` : "none",
        zIndex: drag ? 100 : 1, position: "relative",
        transition: drag ? "none" : "transform 0.25s",
        ...style,
      }}
    >{children}</div>
  );
}

function inZone(ref, x, y) {
  if (!ref.current) return false;
  const r = ref.current.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

// ---------- Decorations ----------
function FloatyBg() {
  const items = ["☁️", "⭐", "☁️", "🌈", "⭐", "☁️"];
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 0 }}>
      {items.map((e, i) => (
        <span key={i} style={{
          position: "absolute", left: `${(i * 17 + 5) % 90}%`, top: `${(i * 31 + 8) % 85}%`,
          fontSize: 34 + (i % 3) * 14, opacity: 0.22,
          animation: `floaty ${6 + i}s ease-in-out ${i * 0.7}s infinite alternate`,
        }}>{e}</span>
      ))}
    </div>
  );
}

function Celebration({ show, big }) {
  if (!show) return null;
  const count = big ? 40 : 26;
  const emo = big ? ["🎉", "⭐", "✨", "🌈", "🎈", "🏆", "💫"] : ["🎉", "⭐", "✨", "💛", "🎈"];
  return (
    <div style={{ position: "fixed", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 50 }}>
      {Array.from({ length: count }, (_, i) => (
        <span key={i} style={{
          position: "absolute", left: `${(i * 37) % 100}%`, top: "-8%",
          fontSize: 22 + ((i * 7) % 22),
          animation: `fall ${big ? 2 : 1.6}s ease-in ${(i % 8) * 0.09}s forwards`,
        }}>{emo[i % emo.length]}</span>
      ))}
    </div>
  );
}

function CheerBubble({ cheer }) {
  if (!cheer) return null;
  return (
    <div style={{
      position: "fixed", left: "50%", top: "38%", transform: "translate(-50%,-50%)",
      zIndex: 60, pointerEvents: "none", textAlign: "center", animation: "cheerPop 0.4s ease",
    }}>
      <div style={{ fontSize: 90, animation: "mascotDance 0.5s ease infinite alternate" }}>🐥</div>
      <div style={{
        background: "#fff", border: "5px solid #FFC93F", borderRadius: 30, padding: "12px 30px",
        fontSize: 38, fontWeight: 900, color: "#E84545", boxShadow: "0 8px 0 rgba(0,0,0,0.12)",
        transform: "rotate(-3deg)", maxWidth: "84vw",
      }}>{cheer}</div>
    </div>
  );
}

function BigBtn({ children, onClick, bg = C.sun, style = {} }) {
  return (
    <button
      onClick={onClick}
      style={{
        fontFamily: "inherit", fontSize: 34, fontWeight: 700, color: "#fff",
        background: bg, border: "none", borderRadius: 28, padding: "18px 10px",
        minWidth: 88, minHeight: 88, boxShadow: "0 6px 0 rgba(0,0,0,0.15)",
        cursor: "pointer", transition: "transform 0.1s", touchAction: "manipulation", ...style,
      }}
      onPointerDown={(e) => (e.currentTarget.style.transform = "scale(0.93)")}
      onPointerUp={(e) => (e.currentTarget.style.transform = "scale(1)")}
      onPointerLeave={(e) => (e.currentTarget.style.transform = "scale(1)")}
    >
      {children}
    </button>
  );
}

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function answerOptions(correct, maxN) {
  const opts = new Set([correct]);
  while (opts.size < 3) opts.add(1 + Math.floor(Math.random() * maxN));
  return shuffle([...opts]);
}

function CountBadge({ n, color = C.coral, small }) {
  const s = small ? 30 : 38;
  return (
    <span style={{
      position: "absolute", top: -12, right: -8, background: color, color: "#fff",
      borderRadius: "50%", width: s, height: s, fontSize: small ? 17 : 22, fontWeight: 800,
      display: "flex", alignItems: "center", justifyContent: "center",
      boxShadow: "0 3px 0 rgba(0,0,0,0.15)", animation: "cheerPop 0.3s ease", zIndex: 2,
    }}>{n}</span>
  );
}

function ThemeTile({ theme, tapped, badge, onClick, size = 90, dancing, dim, delay = 0 }) {
  return (
    <button onClick={onClick} style={{
      fontSize: size * 0.58, background: tapped ? theme.tint : C.card,
      border: `4px solid ${tapped ? theme.color : "#EEE6D8"}`,
      borderRadius: 22, width: size, height: size, cursor: "pointer",
      position: "relative", touchAction: "manipulation",
      opacity: dim ? 0.35 : 1,
      animation: dancing ? `mascotDance 0.4s ease ${delay}s infinite alternate`
        : tapped ? "boing 0.4s" : `popIn 0.35s ease ${delay}s backwards`,
    }}>
      {theme.emoji}
      {tapped && badge != null && <CountBadge n={badge} color={theme.color} small={size < 72} />}
    </button>
  );
}

function randomTheme() { return THEMES[Math.floor(Math.random() * THEMES.length)]; }
function randN(maxN) { return 1 + Math.floor(Math.random() * maxN); }
function label(n, theme) { return `${n} ${n === 1 ? theme.name : theme.plural}`; }
function tileSize(n) { return n > 12 ? 58 : n > 8 ? 68 : 88; }

/* ==================== STAGE 1 GAMES (tap) ==================== */

function CountAndTap({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [n, setN] = useState(2);
  const [theme, setTheme] = useState(THEMES[0]);
  const [tapped, setTapped] = useState([]);
  const [done, setDone] = useState(false);

  useEffect(() => {
    setN(randN(maxN)); setTheme(randomTheme()); setTapped([]); setDone(false);
  }, [round, maxN]);

  const tapItem = (i) => {
    if (tapped.includes(i) || done) return;
    const next = [...tapped, i];
    setTapped(next);
    sounds.count(next.length);
    if (next.length === n) {
      setDone(true); onWin();
      setTimeout(() => setRound((r) => r + 1), 2200);
    }
  };

  const sz = tileSize(n);
  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 24, color: C.ink, margin: "8px 0 4px", fontWeight: 700 }}>
        Tap every <span style={{ color: theme.color }}>{theme.name}</span>! 👆
      </p>
      <div style={{
        display: "flex", flexWrap: "wrap", justifyContent: "center", alignItems: "center",
        gap: 10, minHeight: 220, maxWidth: 440, margin: "0 auto", padding: 10,
      }}>
        {Array.from({ length: n }, (_, i) => (
          <ThemeTile key={`${round}-${i}`} theme={theme} tapped={tapped.includes(i)}
            badge={tapped.indexOf(i) + 1} onClick={() => tapItem(i)}
            size={sz} dancing={done} delay={i * 0.05} />
        ))}
      </div>
      <div style={{ fontSize: done ? 88 : 64, fontWeight: 800, color: done ? C.grass : theme.color, minHeight: 108, transition: "all 0.3s" }}>
        {tapped.length > 0 ? tapped.length : "•"}
        {done && <div style={{ fontSize: 27, color: C.ink }}>{label(n, theme)}! 🎉</div>}
      </div>
    </div>
  );
}

function HowMany({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [n, setN] = useState(2);
  const [theme, setTheme] = useState(THEMES[0]);
  const [opts, setOpts] = useState([1, 2, 3]);
  const [tapped, setTapped] = useState([]);
  const [state, setState] = useState("play");
  const [wrongPick, setWrongPick] = useState(null);

  useEffect(() => {
    const nn = randN(maxN);
    setN(nn); setTheme(randomTheme());
    setOpts(answerOptions(nn, Math.max(maxN, 3)));
    setTapped([]); setState("play"); setWrongPick(null);
  }, [round, maxN]);

  const tapObject = (i) => {
    if (state === "win" || tapped.includes(i)) return;
    const next = [...tapped, i];
    setTapped(next);
    sounds.count(next.length);
  };

  const pick = (v) => {
    if (state === "win") return;
    if (v === n) {
      setState("win"); onWin();
      setTimeout(() => setRound((r) => r + 1), 2200);
    } else {
      setWrongPick(v); sounds.nudge();
      setTimeout(() => setWrongPick(null), 500);
    }
  };

  const allCounted = tapped.length === n;
  const sz = Math.min(tileSize(n), 72);

  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 21, color: C.ink, margin: "8px 0", fontWeight: 700 }}>
        Tap each <span style={{ color: theme.color }}>{theme.name}</span> to count! 👆 Then pick the number!
      </p>
      <div style={{
        display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 8,
        background: C.card, border: `4px solid ${allCounted ? C.grass : "#EEE6D8"}`, borderRadius: 28,
        maxWidth: 430, margin: "0 auto", padding: 12, minHeight: 100, alignItems: "center",
        transition: "border-color 0.3s",
      }}>
        {Array.from({ length: n }, (_, i) => (
          <ThemeTile key={`${round}-${i}`} theme={theme} tapped={tapped.includes(i)}
            badge={tapped.indexOf(i) + 1} onClick={() => tapObject(i)}
            size={sz} dancing={state === "win"} delay={i * 0.05} />
        ))}
      </div>
      {tapped.length > 0 && state !== "win" && (
        <div style={{ fontSize: 40, fontWeight: 900, color: theme.color, marginTop: 6, animation: "cheerPop 0.3s" }}>
          {tapped.length}{allCounted ? " ✅" : "..."}
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 14 }}>
        {opts.map((v, i) => (
          <BigBtn key={v} onClick={() => pick(v)}
            bg={state === "win" && v === n ? C.grass : [C.pool, C.coral, C.berry][i]}
            style={{
              fontSize: 42,
              animation: wrongPick === v ? "wiggle 0.4s" : state === "win" && v === n ? "boing 0.5s" : "none",
            }}>
            {v}
          </BigBtn>
        ))}
      </div>
      {state === "win" && (
        <div style={{ fontSize: 28, marginTop: 12, color: C.grass, fontWeight: 800 }}>
          Yes! {label(n, theme)}! ⭐
        </div>
      )}
    </div>
  );
}

function FindNumber({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [n, setN] = useState(2);
  const [theme, setTheme] = useState(THEMES[0]);
  const [opts, setOpts] = useState([1, 2, 3]);
  const [tapped, setTapped] = useState([]);
  const [state, setState] = useState("play");
  const [wrongPick, setWrongPick] = useState(null);

  useEffect(() => {
    const nn = randN(maxN);
    setN(nn); setTheme(randomTheme());
    setOpts(answerOptions(nn, Math.max(maxN, 3)));
    setTapped([]); setState("play"); setWrongPick(null);
  }, [round, maxN]);

  const tapDot = (i) => {
    if (state === "win" || tapped.includes(i)) return;
    const next = [...tapped, i];
    setTapped(next);
    sounds.count(next.length);
  };

  const pick = (v) => {
    if (state === "win") return;
    if (v === n) {
      setState("win"); onWin();
      setTimeout(() => setRound((r) => r + 1), 2200);
    } else {
      setWrongPick(v); sounds.nudge();
      setTimeout(() => setWrongPick(null), 500);
    }
  };

  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 21, color: C.ink, margin: "8px 0", fontWeight: 700 }}>
        Tap each <span style={{ color: theme.color }}>{theme.name}</span>! 👆 Then find the number!
      </p>
      <div style={{
        display: "inline-flex", flexWrap: "wrap", justifyContent: "center", gap: 10,
        background: theme.color, borderRadius: 28, padding: "20px 22px", maxWidth: 380,
        boxShadow: "0 6px 0 rgba(0,0,0,0.15)",
      }}>
        {Array.from({ length: n }, (_, i) => {
          const isTapped = tapped.includes(i);
          const dotSz = n > 12 ? 48 : 58;
          return (
            <button key={`${round}-${i}`} onClick={() => tapDot(i)} style={{
              width: dotSz, height: dotSz, background: isTapped ? C.sun : "#fff",
              border: "none", borderRadius: "50%", cursor: "pointer",
              touchAction: "manipulation", fontSize: isTapped ? 24 : 30, fontWeight: 900, color: "#fff",
              display: "flex", alignItems: "center", justifyContent: "center", padding: 0,
              animation: isTapped ? "boing 0.4s" : `popIn 0.3s ease ${i * 0.06}s backwards`,
            }}>
              {isTapped ? tapped.indexOf(i) + 1 : theme.emoji}
            </button>
          );
        })}
      </div>
      {tapped.length > 0 && state !== "win" && (
        <div style={{ fontSize: 40, fontWeight: 900, color: theme.color, marginTop: 6, animation: "cheerPop 0.3s" }}>
          {tapped.length}{tapped.length === n ? " ✅" : "..."}
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 14 }}>
        {opts.map((v, i) => (
          <BigBtn key={v} onClick={() => pick(v)}
            bg={state === "win" && v === n ? C.grass : [C.coral, C.pool, C.sun][i]}
            style={{
              fontSize: 42,
              animation: wrongPick === v ? "wiggle 0.4s" : state === "win" && v === n ? "boing 0.5s" : "none",
            }}>
            {v}
          </BigBtn>
        ))}
      </div>
      {state === "win" && (
        <div style={{ fontSize: 28, marginTop: 12, color: C.grass, fontWeight: 800 }}>That's {n}! ⭐</div>
      )}
    </div>
  );
}

function CollectMission({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [target, setTarget] = useState(2);
  const [total, setTotal] = useState(5);
  const [theme, setTheme] = useState(THEMES[0]);
  const [selected, setSelected] = useState([]);
  const [state, setState] = useState("play");

  useEffect(() => {
    const t = randN(maxN);
    setTarget(t);
    setTotal(Math.min(t + 2 + Math.floor(Math.random() * 3), 20));
    setTheme(randomTheme());
    setSelected([]); setState("play");
  }, [round, maxN]);

  const toggle = (i) => {
    if (state === "win") return;
    if (selected.includes(i)) {
      sounds.tap();
      setSelected(selected.filter((x) => x !== i));

      setTimeout(() => setRound((r) => r + 1), 2200);
    }
  };

  const sz = Math.min(tileSize(total), 72);

// Drag numbers onto the track in order: 1, then 2, then 3...
function NumberOrder({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const K = maxN <= 10 ? 5 : maxN <= 15 ? 6 : 8;
  const [chips, setChips] = useState([1, 2, 3, 4, 5]);
  const [placed, setPlaced] = useState([]);
  const [wrongChip, setWrongChip] = useState(null);
  const [state, setState] = useState("play");
  const trackRef = useRef(null);
  const chipColors = ["#E84545", "#2E86DE", "#53C177", "#B76FC4", "#E8890C", "#3AA6B9", "#E0447C", "#7C5CE0"];

  useEffect(() => {
    setChips(shuffle(Array.from({ length: K }, (_, i) => i + 1)));
    setPlaced([]); setWrongChip(null); setState("play");
  }, [round, K]);

  const nextNeeded = placed.length + 1;

  const drop = (v, x, y) => {
    if (state === "win" || placed.includes(v)) return;
    if (!inZone(trackRef, x, y)) return;
    if (v === nextNeeded) {
      const next = [...placed, v];
      setPlaced(next);
      sounds.count(v);
      if (next.length === K) {
        setState("win"); onWin();
        setTimeout(() => setRound((r) => r + 1), 2200);
      }
    } else {
      setWrongChip(v);
      sounds.nudge();
      setTimeout(() => setWrongChip(null), 500);
    }
  };

  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 21, color: C.ink, margin: "8px 0 10px", fontWeight: 700 }}>
        Put the numbers in order! Drag <span style={{ color: C.coral }}>{nextNeeded <= K ? nextNeeded : "✓"}</span> next 🫳
      </p>

      {/* Track (drop zone) */}
      <div ref={trackRef} style={{
        display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap",
        background: state === "win" ? "#DFF7E7" : "#F2EBDD",
        border: `5px dashed ${state === "win" ? C.grass : "#D9C9A6"}`,
        borderRadius: 26, padding: 14, maxWidth: 420, margin: "0 auto",
      }}>
        {Array.from({ length: K }, (_, i) => {
          const v = i + 1;
          const done = placed.includes(v);
          return (
            <div key={v} style={{
              width: 58, height: 58, borderRadius: 18,
              background: done ? chipColors[i % chipColors.length] : "#fff",
              border: done ? "none" : "3px dashed #D9C9A6",
              color: done ? "#fff" : "#D9C9A6",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 30, fontWeight: 900,
              animation: done ? "boing 0.4s" : "none",
            }}>
              {done ? v : "·"}
            </div>
          );
        })}
      </div>

      {/* Chips to drag */}
      <div style={{
        display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 12,
        maxWidth: 420, margin: "20px auto 0", minHeight: 90,
      }}>
        {chips.map((v, i) => (
          placed.includes(v) ? null : (
            <DragItem key={`${round}-${v}`} onDrop={(x, y) => drop(v, x, y)} disabled={state === "win"}>
              <div style={{
                width: 70, height: 70, borderRadius: 22,
                background: chipColors[(v - 1) % chipColors.length], color: "#fff",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 36, fontWeight: 900, boxShadow: "0 5px 0 rgba(0,0,0,0.15)",
                animation: wrongChip === v ? "wiggle 0.4s" : `popIn 0.3s ease ${i * 0.06}s backwards`,
              }}>{v}</div>
            </DragItem>
          )
        ))}
        {state === "win" && (
          <div style={{ fontSize: 30, color: C.grass, fontWeight: 800 }}>
            1 to {K} — all in order! 🎉
          </div>
        )}
      </div>
    </div>
  );
}

// Drag the numeral card onto the group with that many
function MatchGroup({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [target, setTarget] = useState(3);
  const [groups, setGroups] = useState([]);
  const [state, setState] = useState("play");
  const [wrongIdx, setWrongIdx] = useState(null);
  const refs = [useRef(null), useRef(null), useRef(null)];

  useEffect(() => {
    const cap = Math.min(maxN, 9); // groups must be countable
    const counts = new Set();
    while (counts.size < 3) counts.add(randN(cap));
    const arr = shuffle([...counts]);
    const themes = shuffle([...THEMES]).slice(0, 3);
    setGroups(arr.map((c, i) => ({ n: c, theme: themes[i] })));
    setTarget(arr[Math.floor(Math.random() * 3)]);
    setState("play"); setWrongIdx(null);
  }, [round, maxN]);

  const drop = (x, y) => {
    if (state === "win") return;
    const idx = refs.findIndex((r) => inZone(r, x, y));
    if (idx === -1) return;
    if (groups[idx].n === target) {
      setState("win"); onWin();
      setTimeout(() => setRound((r) => r + 1), 2200);
    } else {
      setWrongIdx(idx);
      sounds.nudge();
      setTimeout(() => setWrongIdx(null), 500);
    }
  };

  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 21, color: C.ink, margin: "8px 0 10px", fontWeight: 700 }}>
        Drag the number to the matching group! 🫳
      </p>
      <div style={{ display: "flex", justifyContent: "center", gap: 10, padding: "0 6px", flexWrap: "wrap" }}>
        {groups.map((g, idx) => (
          <div key={`${round}-${idx}`} ref={refs[idx]} style={{
            width: 128, minHeight: 150, background: C.card,
            border: `4px solid ${state === "win" && g.n === target ? C.grass : wrongIdx === idx ? C.coral : g.theme.color}`,
            borderRadius: 24, padding: 8,
            display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center", justifyContent: "center",
            animation: wrongIdx === idx ? "wiggle 0.4s" : state === "win" && g.n === target ? "boing 0.5s" : "none",
          }}>
            {Array.from({ length: g.n }, (_, i) => (
              <span key={i} style={{ fontSize: g.n > 6 ? 24 : 32, animation: `popIn 0.3s ease ${i * 0.05}s backwards` }}>
                {g.theme.emoji}
              </span>
            ))}
            {state === "win" && g.n === target && (
              <div style={{ width: "100%", fontSize: 28, fontWeight: 900, color: C.grass }}>{g.n} ✅</div>
            )}
          </div>
        ))}
      </div>

      <div style={{ marginTop: 24, display: "flex", justifyContent: "center" }}>
        {state !== "win" ? (
          <DragItem onDrop={drop}>
            <div style={{
              width: 100, height: 100, borderRadius: 28, background: C.berry, color: "#fff",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 54, fontWeight: 900, boxShadow: "0 7px 0 rgba(0,0,0,0.15)",
              animation: "boing 0.5s",
            }}>{target}</div>
          </DragItem>
        ) : (
          <div style={{ fontSize: 30, color: C.grass, fontWeight: 800 }}>
            {target} matched! 🎉
          </div>
        )}
      </div>
      <p style={{ color: "#B5ABC9", fontSize: 14, marginTop: 10 }}>Hold the number and slide it onto a group</p>
    </div>
  );
}

// Little sums: a + b with pictures
function LittleSums({ maxN, onWin, sounds }) {
  const [round, setRound] = useState(0);
  const [a, setA] = useState(1);
  const [b, setB] = useState(2);
  const [theme, setTheme] = useState(THEMES[0]);
  const [opts, setOpts] = useState([1, 2, 3]);
  const [state, setState] = useState("play");
  const [wrongPick, setWrongPick] = useState(null);

  useEffect(() => {
    const capSum = maxN <= 10 ? 5 : maxN <= 15 ? 10 : 15;
    const aa = 1 + Math.floor(Math.random() * Math.min(capSum - 1, 7));
    const bb = 1 + Math.floor(Math.random() * Math.min(capSum - aa, 7));
    setA(aa); setB(bb);
    setTheme(randomTheme());
    setOpts(answerOptions(aa + bb, capSum + 2));
    setState("play"); setWrongPick(null);
  }, [round, maxN]);

  const sum = a + b;

  const pick = (v) => {
    if (state === "win") return;
    if (v === sum) {
      setState("win"); onWin();
      setTimeout(() => setRound((r) => r + 1), 2200);
    } else {
      setWrongPick(v); sounds.nudge();
      setTimeout(() => setWrongPick(null), 500);
    }
  };

  const Group = ({ count }) => (
    <div style={{
      display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center", justifyContent: "center",
      background: C.card, border: `4px solid ${theme.color}`, borderRadius: 20,
      padding: 10, minWidth: 90, maxWidth: 150,
    }}>
      {Array.from({ length: count }, (_, i) => (
        <span key={i} style={{ fontSize: count > 5 ? 26 : 34, animation: `popIn 0.3s ease ${i * 0.06}s backwards` }}>
          {theme.emoji}
        </span>
      ))}
    </div>
  );

  return (
    <div style={{ textAlign: "center" }}>
      <p style={{ fontSize: 21, color: C.ink, margin: "8px 0 12px", fontWeight: 700 }}>
        Count them all together! ➕
      </p>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 10, flexWrap: "wrap", padding: "0 6px" }}>
        <Group count={a} />
        <span style={{ fontSize: 44, fontWeight: 900, color: C.coral }}>+</span>
        <Group count={b} />
        <span style={{ fontSize: 44, fontWeight: 900, color: C.pool }}>=</span>
        <span style={{
          fontSize: 48, fontWeight: 900, color: state === "win" ? C.grass : "#D9C9A6",
          minWidth: 70, animation: state === "win" ? "boing 0.5s" : "none",
        }}>
          {state === "win" ? sum : "?"}
        </span>
      </div>
      <div style={{ fontSize: 22, fontWeight: 800, color: C.ink, margin: "12px 0 4px" }}>
        {a} + {b} = ?
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 14, marginTop: 10 }}>
        {opts.map((v, i) => (
          <BigBtn key={v} onClick={() => pick(v)}
            bg={state === "win" && v === sum ? C.grass : [C.pool, C.coral, C.berry][i]}
            style={{
              fontSize: 42,
              animation: wrongPick === v ? "wiggle 0.4s" : state === "win" && v === sum ? "boing 0.5s" : "none",
            }}>
            {v}
          </BigBtn>
        ))}
      </div>
      {state === "win" && (
        <div style={{ fontSize: 28, marginTop: 12, color: C.grass, fontWeight: 800 }}>
          {a} + {b} = {sum}! ⭐
        </div>
      )}
    </div>
  );
}

/* ==================== MAIN APP ==================== */

function NumberFriends() {
  const [screen, setScreen] = useState("home");
  const [stage, setStage] = useState(1);
  const [stars, setStars] = useState(0);
  const [streak, setStreak] = useState(0);
  const [confetti, setConfetti] = useState(false);
  const [bigParty, setBigParty] = useState(false);
  const [cheer, setCheer] = useState(null);
  const [diff, setDiff] = useState("easy");
  const sounds = useSounds();

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("settings");
        if (r && r.value) {
          const s = JSON.parse(r.value);
          if (s.difficulty && DIFFS.some((d) => d.id === s.difficulty)) setDiff(s.difficulty);
          if (s.stage === 1 || s.stage === 2) setStage(s.stage);
        }
      } catch (e) {}
    })();
  }, []);

  const persist = async (patch) => {
    try {
      await window.storage.set("settings", JSON.stringify({ difficulty: diff, stage, ...patch }));
    } catch (e) {}
  };

  const changeDiff = (id) => { setDiff(id); sounds.tap(); persist({ difficulty: id }); };
  const changeStage = (s) => { setStage(s); sounds.tap(); persist({ stage: s }); };

  const maxN = DIFFS.find((d) => d.id === diff).max;

  const onWin = () => {
    setStars((s) => s + 1);
    const newStreak = streak + 1;
    setStreak(newStreak);
    const big = newStreak % 3 === 0;
    setBigParty(big);
    setConfetti(true);
    setCheer(big ? "SUPERSTAR! 🏆" : CHEERS[Math.floor(Math.random() * CHEERS.length)]);
    if (big) sounds.bigWin(); else sounds.win();
    setTimeout(() => { setConfetti(false); setCheer(null); }, big ? 2100 : 1700);
  };

  const stage1Games = [
    { id: "count", label: "Count & Tap", icon: "👆", bg: C.coral, comp: CountAndTap },
    { id: "howmany", label: "How Many?", icon: "🐶", bg: C.pool, comp: HowMany },
    { id: "findnum", label: "Find It", icon: "🔍", bg: C.berry, comp: FindNumber },
    { id: "mission", label: "Collect It", icon: "🧺", bg: C.grass, comp: CollectMission },
    { id: "balloon", label: "Pop Them All", icon: "🎈", bg: "#F2789F", comp: BalloonPop },
    { id: "popn", label: "Pop & Stop", icon: "✋", bg: "#E0447C", comp: PopExactly },
    { id: "numballoon", label: "Number Pop", icon: "💥", bg: "#3AA6B9", comp: NumberBalloons },
    { id: "more", label: "Which is More?", icon: "⚖️", bg: "#F2A33C", comp: WhichMore },
    { id: "bigger", label: "Bigger Number", icon: "🐘", bg: "#7D8BA6", comp: BiggerNumber },
  ];

  const stage2Games = [
    { id: "feed", label: "Fill the Basket", icon: "🧺", bg: "#D9702A", comp: FeedBasket, drag: true },
    { id: "order", label: "Number Order", icon: "🔢", bg: C.pool, comp: NumberOrder, drag: true },
    { id: "match", label: "Match It", icon: "🎯", bg: C.berry, comp: MatchGroup, drag: true },
    { id: "sums", label: "Little Sums", icon: "➕", bg: C.grass, comp: LittleSums },
  ];

  const allGames = [...stage1Games, ...stage2Games];
  const active = allGames.find((g) => g.id === screen);
  const shownGames = stage === 1 ? stage1Games : stage2Games;

  return (
    <div style={{
      minHeight: "100vh", background: C.sky,
      fontFamily: "'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif",
      display: "flex", flexDirection: "column", userSelect: "none", position: "relative",
    }}>
      <style>{`
        @keyframes popIn { from { transform: scale(0); } 60% { transform: scale(1.15); } to { transform: scale(1); } }
        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 70% { transform: scale(0.92); } 100% { transform: scale(1); } }
        @keyframes wiggle { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes fall { to { transform: translateY(110vh) rotate(320deg); opacity: 0.7; } }
        @keyframes floaty { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        @keyframes cheerPop { from { transform: translate(-50%,-50%) scale(0); } 70% { transform: translate(-50%,-50%) scale(1.1); } to { transform: translate(-50%,-50%) scale(1); } }
        @keyframes mascotDance { from { transform: rotate(-8deg) translateY(0); } to { transform: rotate(8deg) translateY(-10px); } }
        @keyframes rainbowWiggle { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
      `}</style>

      <FloatyBg />
      <Celebration show={confetti} big={bigParty} />
      <CheerBubble cheer={cheer} />

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 18px", position: "relative", zIndex: 1 }}>
        {screen !== "home" ? (
          <button onClick={() => { setStreak(0); setScreen("home"); }} style={{
            fontSize: 26, background: "#fff", border: "3px solid #EEE6D8", borderRadius: 20,
            width: 58, height: 58, cursor: "pointer",
          }} aria-label="Back to home">🏠</button>
        ) : <div style={{ width: 58 }} />}
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <button onClick={sounds.toggleMute} style={{
            fontSize: 24, background: "#fff", border: "3px solid #EEE6D8", borderRadius: 20,
            width: 52, height: 52, cursor: "pointer",
          }} aria-label={sounds.muted ? "Turn sound on" : "Turn sound off"}>
            {sounds.muted ? "🔇" : "🔊"}
          </button>
          <div style={{
            background: "#fff", border: "3px solid #EEE6D8", borderRadius: 20,
            padding: "8px 18px", fontSize: 24, fontWeight: 800, color: C.ink,
            animation: confetti ? "boing 0.5s" : "none",
          }}>⭐ {stars}</div>
        </div>
      </div>

      <div style={{ flex: 1, padding: "0 12px 24px", position: "relative", zIndex: 1 }}>
        {screen === "home" && (
          <div style={{ textAlign: "center", maxWidth: 440, margin: "0 auto" }}>
            <div style={{ fontSize: 54, margin: "0", animation: "mascotDance 1.2s ease infinite alternate", display: "inline-block" }}>🐥</div>
            <h1 style={{
              fontSize: 34, margin: "0 0 6px", letterSpacing: 1,
              display: "inline-block", width: "100%",
              animation: "rainbowWiggle 2.5s ease infinite",
              background: "linear-gradient(90deg, #E84545, #FFC93F, #53C177, #2E86DE, #7C5CE0)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
              backgroundClip: "text", fontWeight: 900,
            }}>Number Friends</h1>

            {/* Stage tabs */}
            <div style={{
              display: "inline-flex", gap: 6, background: "#fff", border: "3px solid #EEE6D8",
              borderRadius: 22, padding: 6, marginBottom: 10,
            }}>
              {[{ s: 1, label: "Stage 1", icon: "⭐", sub: "Tap & count" }, { s: 2, label: "Stage 2", icon: "🚀", sub: "Drag & drop" }].map((t) => (
                <button key={t.s} onClick={() => changeStage(t.s)} style={{
                  fontFamily: "inherit", border: "none", borderRadius: 16, cursor: "pointer",
                  padding: "8px 20px", fontSize: 17, fontWeight: 800, touchAction: "manipulation",
                  background: stage === t.s ? C.berry : "transparent",
                  color: stage === t.s ? "#fff" : "#B5ABC9",
                  boxShadow: stage === t.s ? "0 3px 0 rgba(0,0,0,0.12)" : "none",
                  transition: "all 0.15s",
                }}>
                  {t.icon} {t.label}
                  <div style={{ fontSize: 11, fontWeight: 700, opacity: 0.85 }}>{t.sub}</div>
                </button>
              ))}
            </div>

            {/* Difficulty selector */}
            <div style={{
              display: "inline-flex", gap: 6, background: "#fff", border: "3px solid #EEE6D8",
              borderRadius: 22, padding: 6, margin: "0 0 14px",
            }}>
              {DIFFS.map((d) => (
                <button key={d.id} onClick={() => changeDiff(d.id)} style={{
                  fontFamily: "inherit", border: "none", borderRadius: 16, cursor: "pointer",
                  padding: "6px 14px", fontSize: 15, fontWeight: 800, touchAction: "manipulation",
                  background: diff === d.id ? C.sun : "transparent",
                  color: diff === d.id ? "#7A5800" : "#B5ABC9",
                  boxShadow: diff === d.id ? "0 3px 0 rgba(0,0,0,0.12)" : "none",
                  transition: "all 0.15s",
                }}>
                  <span style={{ fontSize: 18 }}>{d.icon}</span> {d.label}
                  <div style={{ fontSize: 11, fontWeight: 700 }}>{d.desc}</div>
                </button>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {shownGames.map((g, gi) => (
                <button key={g.id} onClick={() => { sounds.tap(); setStreak(0); setScreen(g.id); }} style={{
                  fontFamily: "inherit", display: "flex", flexDirection: "column",
                  alignItems: "center", gap: 6, background: g.bg, color: "#fff",
                  border: "none", borderRadius: 24, padding: "14px 8px",
                  fontSize: 18, fontWeight: 800, cursor: "pointer", position: "relative",
                  boxShadow: "0 6px 0 rgba(0,0,0,0.15)", touchAction: "manipulation",
                  animation: `popIn 0.4s ease ${gi * 0.07}s backwards`,
                  gridColumn: shownGames.length % 2 === 1 && gi === shownGames.length - 1 ? "1 / -1" : "auto",
                }}>
                  <span style={{ fontSize: 36 }}>{g.icon}</span> {g.label}
                  {g.drag && (
                    <span style={{
                      position: "absolute", top: 8, right: 10, background: "rgba(255,255,255,0.9)",
                      color: C.berry, borderRadius: 10, fontSize: 11, fontWeight: 900, padding: "2px 8px",
                    }}>DRAG 🫳</span>
                  )}
                </button>
              ))}
            </div>
            <p style={{ color: "#B5ABC9", fontSize: 12.5, marginTop: 20 }}>
              For grown-ups: Stage 1 is tap-to-count games; Stage 2 adds drag & drop
              (fill the basket, order the numbers, match numbers to groups) and first sums.
              Easy is 1–10, Medium 1–15, Hard 1–20 — stage and difficulty are saved.
              Tap 🔊 to test sound; on iPhone also check the silent switch. Beta v0.8
            </p>
          </div>
        )}
        {active && <active.comp maxN={maxN} onWin={onWin} sounds={sounds} />}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<NumberFriends />);
</script>
